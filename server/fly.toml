# Optional — Fly.io requires a credit card. Prefer Render (../render.yaml) or Hugging Face Spaces.
app = "master-lab-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  CORS_ORIGINS = "https://devghosty.github.io,http://localhost:8100,http://127.0.0.1:8100"
