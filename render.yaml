# Render Blueprint — free web service (no Fly.io card required).
# Dashboard: New → Blueprint → connect DevGhosty/Master-Lab repo.
# https://render.com/docs/free

services:
  - type: web
    name: master-lab-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://devghosty.github.io,http://localhost:8100,http://127.0.0.1:8100
      - key: CORS_ALLOW_PLATFORM_HOSTS
        value: "false"
      - key: MAX_ACTIVE_RENDER_TASKS
        value: "2"
      - key: FFMPEG_TIMEOUT_MS
        value: "720000"
      - key: JOB_RESULT_TTL_MS
        value: "600000"
      - key: JOB_STALE_MS
        value: "840000"
