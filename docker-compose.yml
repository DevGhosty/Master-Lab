services:
  master-lab-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:7860"
    environment:
      PORT: "7860"
      CORS_ORIGINS: "https://devghosty.github.io,http://localhost:8100,http://127.0.0.1:8100"
      CORS_ALLOW_PLATFORM_HOSTS: "false"
      MAX_ACTIVE_RENDER_TASKS: "2"
      FFMPEG_TIMEOUT_MS: "720000"
      JOB_RESULT_TTL_MS: "600000"
      JOB_STALE_MS: "840000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7860/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
